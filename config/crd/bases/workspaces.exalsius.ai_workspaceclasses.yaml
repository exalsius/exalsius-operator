---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.1
  name: workspaceclasses.workspaces.exalsius.ai
spec:
  group: workspaces.exalsius.ai
  names:
    kind: WorkspaceClass
    listKind: WorkspaceClassList
    plural: workspaceclasses
    shortNames:
    - wsc
    singular: workspaceclass
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .spec.defaultResources.replicas
      name: Replicas
      type: integer
    - jsonPath: .spec.serviceTemplate.name
      name: ServiceTemplate
      type: string
    - jsonPath: .status.valid
      name: Valid
      type: boolean
    - jsonPath: .status.validationError
      name: ValidationError
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          WorkspaceClass is a cluster-scoped catalog entry that defines a workspace type.
          Users reference it by name when creating a WorkspaceDeployment.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkspaceClassSpec defines the catalog entry for a workspace
              type.
            properties:
              accessEndpoints:
                description: AccessEndpoints declares the network endpoints this workspace
                  type exposes.
                items:
                  description: AccessEndpoint declares a network endpoint that the
                    workspace exposes.
                  properties:
                    description:
                      description: Description is a human-readable summary shown to
                        users.
                      type: string
                    name:
                      description: Name is a unique identifier for this endpoint within
                        the class.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    port:
                      description: Port is the container port the workspace listens
                        on.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    protocol:
                      description: Protocol is the wire protocol for this endpoint.
                      enum:
                      - HTTP
                      - TCP
                      - SSH
                      type: string
                  required:
                  - name
                  - port
                  - protocol
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              defaultResources:
                description: DefaultResources are applied when a WorkspaceDeployment
                  does not override them.
                properties:
                  perReplica:
                    description: PerReplica specifies resources requested per replica.
                    properties:
                      cpu:
                        anyOf:
                        - type: integer
                        - type: string
                        description: CPU is the number of CPU cores requested (e.g.
                          "4", "500m").
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      gpuCount:
                        description: GPUCount is the number of GPUs requested per
                          replica.
                        format: int32
                        minimum: 0
                        type: integer
                      gpuType:
                        description: |-
                          GPUType is a deployment-time preference for a specific GPU model
                          (e.g. "H100", "A100", "L40"). When unset on a WorkspaceDeployment,
                          feasibility matches GPUs of any model. Cannot be set on a
                          WorkspaceClass — type is a per-deployment cluster-dependent choice.
                        type: string
                      gpuVendor:
                        description: |-
                          GPUVendor constrains the GPU vendor (NVIDIA or AMD). Set on a
                          WorkspaceClass to express chart-level vendor compatibility (e.g. CUDA
                          vs ROCm); inheritable into a WorkspaceDeployment that doesn't override it.
                        enum:
                        - NVIDIA
                        - AMD
                        type: string
                      memory:
                        anyOf:
                        - type: integer
                        - type: string
                        description: Memory is the amount of memory requested (e.g.
                          "16Gi").
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      storage:
                        anyOf:
                        - type: integer
                        - type: string
                        description: Storage is the amount of persistent storage requested
                          (e.g. "100Gi").
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                  replicas:
                    default: 1
                    description: |-
                      Replicas is the number of pod-shaped instances the workspace deploys.
                      Defaults to 1.
                    format: int32
                    minimum: 1
                    type: integer
                required:
                - perReplica
                type: object
              defaultValues:
                description: DefaultValues provides base Helm values that are always
                  applied.
                x-kubernetes-preserve-unknown-fields: true
              deployTimeout:
                description: |-
                  DeployTimeout is the maximum time to wait for the workspace Helm release
                  to become ready. Useful for workspaces with large images that take long to pull.
                  Defaults to 15 minutes if not set.
                type: string
              description:
                description: Description provides a user-facing summary of what this
                  workspace type offers.
                type: string
              displayName:
                description: DisplayName is the human-readable name shown in the workspace
                  catalog.
                minLength: 1
                type: string
              prerequisiteDeployTimeout:
                description: |-
                  PrerequisiteDeployTimeout overrides DeployTimeout for prerequisite Helm
                  releases. Useful when prerequisite operators take noticeably longer or
                  shorter to install than the workspace itself. Defaults to DeployTimeout
                  when nil.
                type: string
              prerequisites:
                description: |-
                  Prerequisites lists additional ServiceTemplates that must be healthy on the
                  target cluster before the workspace can be deployed.
                items:
                  description: |-
                    PrerequisiteSpec declares a ServiceTemplate dependency with optional Helm
                    value overrides applied when the operator auto-installs the prerequisite
                    onto the target cluster.
                  properties:
                    serviceTemplate:
                      description: ServiceTemplate references the prerequisite ServiceTemplate.
                      properties:
                        name:
                          description: Name is the name of the ServiceTemplate CR.
                          maxLength: 253
                          minLength: 1
                          type: string
                        namespace:
                          description: Namespace of the ServiceTemplate. When unspecified,
                            the system namespace is implied.
                          type: string
                        versionConstraint:
                          description: VersionConstraint is an optional SemVer constraint
                            (e.g. ">=1.2.0").
                          type: string
                      required:
                      - name
                      type: object
                    values:
                      description: |-
                        Values are optional Helm value overrides applied when installing this
                        prerequisite. When nil, chart defaults are used.
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - serviceTemplate
                  type: object
                type: array
              serviceTemplate:
                description: |-
                  ServiceTemplate references the k0rdent ServiceTemplate CR that wraps the
                  Helm chart for this workspace type.
                properties:
                  name:
                    description: Name is the name of the ServiceTemplate CR.
                    maxLength: 253
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the ServiceTemplate. When unspecified,
                      the system namespace is implied.
                    type: string
                  versionConstraint:
                    description: VersionConstraint is an optional SemVer constraint
                      (e.g. ">=1.2.0").
                    type: string
                required:
                - name
                type: object
              userFacingConfig:
                description: UserFacingConfig lists Helm value paths that the CLI
                  should prompt for.
                items:
                  description: |-
                    UserFacingConfigField annotates a single Helm value path that the CLI should
                    prompt users for during workspace creation.
                  properties:
                    default:
                      description: Default is the default value shown in the prompt.
                      x-kubernetes-preserve-unknown-fields: true
                    description:
                      description: Description provides additional context shown as
                        help text.
                      type: string
                    displayName:
                      description: DisplayName is the label shown to the user in the
                        CLI prompt.
                      minLength: 1
                      type: string
                    helmValuePath:
                      description: HelmValuePath is a dot-delimited path into values.yaml
                        (e.g. "jupyter.password").
                      minLength: 1
                      type: string
                    options:
                      description: Options constrains the input to a closed set of
                        allowed values.
                      items:
                        type: string
                      type: array
                    required:
                      description: Required indicates the user must provide a value.
                      type: boolean
                    type:
                      default: string
                      description: Type is the input type for validation and display.
                      enum:
                      - string
                      - int
                      - bool
                      - secret
                      - publicKey
                      type: string
                  required:
                  - displayName
                  - helmValuePath
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - helmValuePath
                x-kubernetes-list-type: map
            required:
            - defaultResources
            - displayName
            - serviceTemplate
            type: object
            x-kubernetes-validations:
            - message: gpuType cannot be set on a WorkspaceClass — it is a per-deployment
                cluster-dependent choice
              rule: '!has(self.defaultResources.perReplica.gpuType)'
          status:
            description: WorkspaceClassStatus reports the observed state of a WorkspaceClass.
            properties:
              conditions:
                description: Conditions represent the latest observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation that was
                  last reconciled.
                format: int64
                type: integer
              valid:
                description: |-
                  Valid indicates whether the referenced ServiceTemplate is available and
                  itself reports valid=true.
                type: boolean
              validationError:
                description: |-
                  ValidationError describes why the WorkspaceClass is not valid.
                  Empty when Valid is true.
                type: string
            required:
            - valid
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
